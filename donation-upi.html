<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate - Al-Ilam Wal Khair Foundation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f3f4f6; }
        .donation-form { max-width: 400px; margin: 40px auto; }
        .donation-form input, .donation-form button { font-size: 1rem; }
    </style>
</head>
<body class="font-sans text-gray-800">
    <div class="donation-form bg-white rounded-lg shadow-lg p-8">
        <h2 class="text-2xl font-bold mb-6 text-center">Donate Now</h2>
        <form id="donation-form" class="space-y-4">
            <div>
                <label class="block text-sm font-bold mb-2">Your Name</label>
                <input type="text" id="donor-name" class="w-full border-2 border-gray-300 rounded-lg p-3 focus:outline-none focus:border-blue-500" placeholder="Enter your name" required>
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Your Phone</label>
                <input type="tel" id="donor-phone" class="w-full border-2 border-gray-300 rounded-lg p-3 focus:outline-none focus:border-blue-500" placeholder="Enter your phone number" required>
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Your Email</label>
                <input type="email" id="donor-email" class="w-full border-2 border-gray-300 rounded-lg p-3 focus:outline-none focus:border-blue-500" placeholder="Enter your email" required>
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Your Adhar/PAN/Voter number <span class="text-gray-400 text-xs">(optional)</span></label>
                <input type="text" id="donor-id" class="w-full border-2 border-gray-300 rounded-lg p-3 focus:outline-none focus:border-blue-500" placeholder="Enter your Adhar/PAN/Voter number">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Amount (₹)</label>
                <input type="number" id="donation-amount" class="w-full border-2 border-gray-300 rounded-lg p-3 focus:outline-none focus:border-blue-500" placeholder="Enter amount" min="1" required>
            </div>
            <button type="submit" id="donate-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">Donate</button>
        </form>
    </div>
    <script>
        document.getElementById('donation-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const amountInput = document.getElementById('donation-amount');
            const amount = amountInput.value.trim();
            if (!amount || isNaN(amount) || Number(amount) <= 0) {
                alert('Please enter a valid donation amount greater than 0.');
                amountInput.focus();
                return;
            }
            const upiId = 'QR918050732073-0066@unionbankofindia';
            const upiName = encodeURIComponent('ALILM WALKHAYR FOUNDATION');
            const upiLink = `upi://pay?pa=${upiId}&pn=${upiName}&am=${amount}&cu=INR`;
            window.location.href = upiLink;
        });
    </script>
</body>
</html>
